<div class="card">
    <div class="card-header">
        <h5 class="card-title">{{ __('Update Password') }}</h5>
        <p class="text-muted mb-0 mt-2">{{ __('Ensure your account is using a long, random password to stay secure.') }}</p>
    </div>
    <div class="card-body">
        <form wire:submit.prevent="updatePassword">
            <div class="mb-3">
                <label for="current_password" class="form-label">{{ __('Current Password') }}</label>
                <input id="current_password" type="password" class="form-control" wire:model="state.current_password"
                    autocomplete="current-password">
                <x-input-error for="current_password" class="d-block text-danger mt-2" />
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">{{ __('New Password') }}</label>
                <input id="password" type="password" class="form-control" wire:model="state.password"
                    autocomplete="new-password">
                <x-input-error for="password" class="d-block text-danger mt-2" />
            </div>

            <div class="mb-3">
                <label for="password_confirmation" class="form-label">{{ __('Confirm Password') }}</label>
                <input id="password_confirmation" type="password" class="form-control" wire:model="state.password_confirmation"
                    autocomplete="new-password">
                <x-input-error for="password_confirmation" class="d-block text-danger mt-2" />
            </div>

            <div class="d-flex justify-content-end align-items-center">
                <x-action-message class="me-3 text-success" on="saved">
                    {{ __('Saved.') }}
                </x-action-message>
                <button type="submit" class="btn btn-primary" wire:loading.attr="disabled">
                    <span wire:loading.remove wire:target="updatePassword">{{ __('Save') }}</span>
                    <span wire:loading wire:target="updatePassword">
                        <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                        {{ __('Saving...') }}
                    </span>
                </button>
            </div>
        </form>
    </div>
</div>
