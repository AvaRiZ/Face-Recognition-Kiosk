<!-- Loading Overlay Component -->
<div id="loadingOverlay" class="loading-overlay">

    <div id="loadingMessage">{{ message | default('') }}</div>

    <!-- Loading Spinner -->
    <div class="loading-spinner"></div>
</div>

<style>
    .loading-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.7);
        color: #fff;
        font-size: var(--font-size-4xl, 17px);
        text-align: center;
        z-index: 9999;
        pointer-events: none;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }

    .loading-spinner {
        margin: 16px auto;
        border: 6px solid #f3f3f3;
        border-top: 6px solid #eb1c24;
        border-radius: 50%;
        width: 48px;
        height: 48px;
        animation: spin 1s linear infinite;
    }

    @keyframes spin {
        0% {
            transform: rotate(0deg);
        }

        100% {
            transform: rotate(360deg);
        }
    }
</style>

<script>
    function showLoading(message = '') {
        try {
            let overlay = document.getElementById('loadingOverlay');
            let loadingMessage = message || `{{ message | default('') }}`;
            if (overlay) {
                const msgEl = document.getElementById('loadingMessage');
                if (msgEl) msgEl.innerText = loadingMessage;
                overlay.style.pointerEvents = 'auto';
                overlay.style.display = 'flex';
            }
        } catch (e) {
            console.warn('showLoading error', e);
        }
    }

    function hideLoading() {
        try {
            let overlay = document.getElementById('loadingOverlay');
            if (overlay) {
                overlay.style.display = 'none';
                overlay.style.pointerEvents = 'none';
            }
        } catch (e) {
            console.warn('hideLoading error', e);
        }
    }

    document.addEventListener('DOMContentLoaded', hideLoading);
    window.addEventListener('pageshow', hideLoading);
    window.addEventListener('pagehide', hideLoading);
    
    document.addEventListener('visibilitychange', function() {
        if (document.visibilityState === 'visible') hideLoading();
    });

    document.addEventListener('livewire:navigating', () => {
        showLoading();
    });
    
    document.addEventListener('livewire:navigated', () => {
        hideLoading();
    });
</script>
