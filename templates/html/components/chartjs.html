@once
    <script>
        (function() {
            window.__bladeCharts = window.__bladeCharts || {
                apex: {},
                chartjs: {},
                echarts: {}
            };

            window.renderChartJsBladeChart = function(chartId) {
                var canvas = document.getElementById(chartId);
                var configNode = document.getElementById(chartId + '-chartjs-config');

                if (!canvas || !configNode || !window.Chart) {
                    return;
                }

                var payload = {};
                try {
                    payload = JSON.parse(configNode.textContent || '{}');
                } catch (error) {
                    return;
                }

                if (window.__bladeCharts.chartjs[chartId]) {
                    window.__bladeCharts.chartjs[chartId].destroy();
                }

                // Also destroy by canvas reference in case a previous render
                // failed before storing the instance in our local registry.
                if (typeof window.Chart.getChart === 'function') {
                    var existingChart = window.Chart.getChart(canvas);
                    if (existingChart) {
                        existingChart.destroy();
                    }
                }

                var chartData =
                    payload.data && typeof payload.data === 'object' && !Array.isArray(payload.data) ?
                    payload.data : {
                        labels: [],
                        datasets: []
                    };

                var chartOptions =
                    payload.options && typeof payload.options === 'object' && !Array.isArray(payload.options) ?
                    payload.options : {};

                var context = canvas.getContext('2d');
                window.__bladeCharts.chartjs[chartId] = new window.Chart(context, {
                    type: payload.type || 'line',
                    data: chartData,
                    options: chartOptions
                });
            };

            window.initChartJsBladeCharts = function() {
                document.querySelectorAll('[data-chartjs-config]').forEach(function(config) {
                    window.renderChartJsBladeChart(config.dataset.chartId);
                });
            };

            if (!window.__chartJsBladeChartsHooksBound) {
                window.__chartJsBladeChartsHooksBound = true;

                document.addEventListener('DOMContentLoaded', window.initChartJsBladeCharts);
                document.addEventListener('livewire:navigated', window.initChartJsBladeCharts);
                document.addEventListener('livewire:load', window.initChartJsBladeCharts);

                var bindChartJsLivewireHooks = function() {
                    if (window.Livewire && typeof window.Livewire.hook === 'function') {
                        window.Livewire.hook('message.processed', function() {
                            window.initChartJsBladeCharts();
                        });
                    }
                };

                bindChartJsLivewireHooks();
                document.addEventListener('livewire:init', bindChartJsLivewireHooks);
            }
        })();
    </script>
@endonce

<script>

</script>
