<!-- Bubble Chat Wrapper -->
<div id="bubble-chat-wrapper" class="bubble-chat-wrapper">
    <!-- Chat Bubble Icon -->
    <div class="bubble-chat-icon" id="chat-toggle">💬</div>

    <!-- Chat Container -->
    <div class="bubble-chat-container" id="chat-container">
        <div class="bubble-chat-header" id="chat-header">
            <span>Chat</span>
            <button class="chat-close" id="chat-close">&times;</button>
        </div>
        <div class="bubble-chat-box" id="chat-box"></div>
        <!-- Chat Input Form -->
        <form id="chat-form" class="bubble-chat-input">
            {# csrf token handled by Flask-WTF if enabled #}
            <input type="text" id="chat-input" placeholder="Type a message..." required autocomplete="off">
            <button type="submit" class="mb-1">Send</button>
        </form>
    </div>
</div>

<script>
    // Change to Livewire's navigation event
    document.addEventListener('livewire:navigated', function() {
        const wrapper = document.getElementById("bubble-chat-wrapper");
        
        // IMPORTANT: Prevent Livewire from duplicating the chat on every page click
        if (!wrapper || wrapper.dataset.initialized) return;
        wrapper.dataset.initialized = "true";

        const chatToggle = document.getElementById("chat-toggle");
        const chatContainer = document.getElementById("chat-container");
        const chatClose = document.getElementById("chat-close");
        const chatForm = document.getElementById("chat-form");
        const chatInput = document.getElementById("chat-input");
        const chatBox = document.getElementById("chat-box");
        const chatHeader = document.getElementById("chat-header");

        let typingIndicator = null;

        // --- DRAGGABLE BUBBLE CHAT (ICON + CONTAINER) ---
        let isDragging = false;
        let dragOffsetX = 0;
        let dragOffsetY = 0;
        let initialLeft = 20;
        let initialBottom = 45;

        // Set initial position
        wrapper.style.left = initialLeft + 'px';
        wrapper.style.bottom = initialBottom + 'px';
        wrapper.style.right = '';
        wrapper.style.top = '';

        // Drag handle: icon or header
        function dragStart(e) {
            isDragging = true;
            const rect = wrapper.getBoundingClientRect();
            let handleRect;
            if (e.target === chatToggle) {
                handleRect = chatToggle.getBoundingClientRect();
                dragOffsetX = e.clientX - (handleRect.left + handleRect.width / 2);
                dragOffsetY = window.innerHeight - handleRect.bottom + (handleRect.height / 2) - e.clientY;
            } else {
                handleRect = chatHeader.getBoundingClientRect();
                dragOffsetX = e.clientX - (handleRect.left + handleRect.width / 2);
                dragOffsetY = window.innerHeight - handleRect.top - (handleRect.height / 2) - e.clientY;
            }
            document.body.style.userSelect = 'none';
        }
        
        function dragMove(e) {
            if (!isDragging) return;
            let newLeft = e.clientX - dragOffsetX - wrapper.offsetWidth / 2 + (e.target === chatToggle ? chatToggle.offsetWidth / 2 : chatHeader.offsetWidth / 2);
            let newBottom;
            if (e.target === chatToggle) {
                newBottom = window.innerHeight - e.clientY - chatToggle.offsetHeight / 2;
            } else {
                newBottom = window.innerHeight - e.clientY - chatHeader.offsetHeight / 2;
            }
            newLeft = Math.max(0, Math.min(newLeft, window.innerWidth - wrapper.offsetWidth));
            newBottom = Math.max(0, Math.min(newBottom, window.innerHeight - 50));
            wrapper.style.left = newLeft + 'px';
            wrapper.style.bottom = newBottom + 'px';
        }
        
        function dragEnd() {
            isDragging = false;
            document.body.style.userSelect = '';
        }
        
        chatHeader.style.cursor = 'move';
        chatToggle.style.cursor = 'grab';
        chatHeader.addEventListener('mousedown', dragStart);
        chatToggle.addEventListener('mousedown', dragStart);
        document.addEventListener('mousemove', dragMove);
        document.addEventListener('mouseup', dragEnd);

        // Load chat history from session
        fetch("{{ url_for('chat.history') }}")
            .then(response => response.json())
            .then(data => {
                if (data.history) {
                    data.history.forEach(msg => appendMessage(msg.role, msg.content, msg.time));
                }
            })
            .catch(error => console.error("Error fetching chat history:", error));

        // Toggle chat visibility
        chatToggle.addEventListener("click", function() {
            chatContainer.classList.toggle("visible");
        });
        
        chatClose.addEventListener("click", function() {
            chatContainer.classList.remove("visible");
        });

        chatForm.addEventListener("submit", function(event) {
            event.preventDefault();

            let message = chatInput.value.trim();
            if (!message) return;

            appendMessage("sent", message, new Date().toLocaleTimeString());
            showTypingIndicator();

            fetch("{{ url_for('chat.send') }}", {
                    method: "POST",
                    headers: {
                        "X-CSRF-TOKEN": "{{ csrf_token() }}",
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        message: message
                    })
                })
                .then(response => response.json())
                .then(data => {
                    removeTypingIndicator();
                    if (data.error) {
                        appendMessage("received", "Error: " + data.error);
                    } else {
                        appendMessage("received", data.received, data.time);
                    }
                })
                .catch(error => {
                    removeTypingIndicator();
                    appendMessage("received", "Error: Could not connect to the server.");
                });

            chatInput.value = ""; 
        });

        function appendMessage(type, text, time = new Date().toLocaleTimeString()) {
            let messageDiv = document.createElement("div");
            messageDiv.classList.add("chat-message", type);

            let bubbleDiv = document.createElement("div");
            bubbleDiv.classList.add("chat-bubble");
            bubbleDiv.innerHTML = `<p>${text}</p><span class="chat-time">${time}</span>`;

            messageDiv.appendChild(bubbleDiv);
            chatBox.appendChild(messageDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function showTypingIndicator() {
            if (typingIndicator) return; 

            typingIndicator = document.createElement("div");
            typingIndicator.classList.add("chat-message", "received");
            typingIndicator.innerHTML = `<div class="chat-bubble typing-indicator">...</div>`;

            chatBox.appendChild(typingIndicator);
            chatBox.scrollTop = chatBox.scrollHeight; 
        }

        function removeTypingIndicator() {
            if (typingIndicator) {
                typingIndicator.remove();
                typingIndicator = null;
            }
        }
    });
</script>
