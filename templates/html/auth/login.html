{% extends 'html/layouts/guest.html' %}
{% block content %}
<main class="animate__animated animate__fadeIn animate__fast">
    <div class="container">
        <section class="section register min-vh-100 d-flex flex-column align-items-center justify-content-center py-4">
            <div class="container animate__animated animate__fadeInUp animate__fast">
                <div class="d-flex justify-content-center mb-3">
                    <a href="{{ url_for('auth_routes.auth_login') }}">
                        <img src="{{ url_for('static', filename='assets/img/bsu-new-logo.png') }}" alt="BatStateU Logo" style="width: 24rem; height: auto;">
                    </a>
                </div>

                <div class="row justify-content-center">
                    <div class="col-lg-4 col-md-6 d-flex flex-column align-items-center justify-content-center">
                        <div class="card mb-3">
                            <div class="card-body">
                                <div class="pt-4 pb-2 animate__animated animate__fadeInUp animate__fast">
                                    <h5 class="card-title text-center pb-0 fs-4">Login to Your Account</h5>
                                    <p class="text-center small">Enter your username and password to login</p>
                                </div>

                                {% if error %}
                                <div class="alert alert-danger mb-3">{{ error }}</div>
                                {% endif %}

                                <form method="POST" action="{{ url_for('auth_routes.auth_login') }}" class="row g-3 needs-validation animate__animated animate__fadeInUp animate__fast" novalidate>
                                    <input type="hidden" name="next" value="{{ next_url }}">

                                    <div class="col-12">
                                        <label for="username" class="form-label">Username</label>
                                        <div class="input-group has-validation">
                                            <input id="username" type="text" class="form-control" name="username" required placeholder="Enter your username" autocomplete="username" autofocus>
                                            <div class="invalid-feedback">Please enter your username.</div>
                                        </div>
                                    </div>

                                    <div class="col-12">
                                        <label for="password" class="form-label">Password</label>
                                        <input id="password" type="password" class="form-control" name="password" required placeholder="Enter your password" autocomplete="current-password">
                                        <div class="invalid-feedback">Please enter your password.</div>
                                    </div>

                                    <div class="col-12">
                                        <button type="submit" class="btn btn-primary w-100">Login</button>
                                    </div>

                                    <div class="col-12 text-center">
                                        <small class="text-muted">Default superadmin: <strong>superadmin / password</strong></small>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>
</main>
{% endblock %}
