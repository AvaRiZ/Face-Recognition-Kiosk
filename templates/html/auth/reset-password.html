{% extends 'html/layouts/guest.html' %}
{% block content %}
    <main class="animate__animated animate__fadeIn animate__fast">
        <div class="container">
            {% include 'html/components/toasts.html' %}

            <section
                class="section register min-vh-100 d-flex flex-column align-items-center justify-content-center py-4">
                <div class="container animate__animated animate__fadeInUp animate__fast">
                    <div class="row justify-content-center">
                        <x-batstateu-full-logo :route="route('home')" />

                        <div class="col-lg-4 col-md-6 d-flex flex-column align-items-center justify-content-center">
                            <div class="card mb-3">
                                <div class="card-body">
                                    <div class="pt-4 pb-2 animate__animated animate__fadeInUp animate__fast">
                                        <h5 class="card-title text-center pb-0 fs-4">Reset Password</h5>
                                        <p class="text-center small">Enter your new password below</p>
                                    </div>

                                    <form method="POST" action="{{ url_for('password.update') }}"
                                        class="row g-3 needs-validation animate__animated animate__fadeInUp animate__fast"
                                        novalidate>
                                        {# csrf token handled by Flask-WTF if enabled #}

                                        <input type="hidden" name="token" value="{{ request.url_for('token') }}">

                                        <div class="col-12">
                                            <label for="email" class="form-label">Email</label>
                                            <input id="email" type="email" class="form-control" name="email"
                                                value="{{ old('email', request.email) }}" required autofocus
                                                autocomplete="username" placeholder="Enter your email" />
                                        </div>

                                        <div class="col-12">
                                            <label for="password" class="form-label">New Password</label>
                                            <input id="password" type="password" class="form-control" name="password"
                                                required autocomplete="new-password" placeholder="Create a password" />
                                        </div>

                                        <div class="col-12">
                                            <label for="password_confirmation" class="form-label">Confirm Password</label>
                                            <input id="password_confirmation" type="password" class="form-control"
                                                name="password_confirmation" required autocomplete="new-password"
                                                placeholder="Confirm your password" />
                                        </div>

                                        <div class="col-12">
                                            <button type="submit" class="btn btn-primary w-100">Reset Password</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>
{% endblock %}
