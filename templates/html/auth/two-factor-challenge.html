{% extends 'html/layouts/guest.html' %}
{% block content %}
    <main class="animate__animated animate__fadeIn animate__fast">
        <div class="container">
            {% include 'html/components/toasts.html' %}

            <section
                class="section register min-vh-100 d-flex flex-column align-items-center justify-content-center py-4">
                <div class="container animate__animated animate__fadeInUp animate__fast">
                    <div class="row justify-content-center">
                        <div class="col-lg-4 col-md-6 d-flex flex-column align-items-center justify-content-center">
                            <div class="card mb-3">
                                <div class="card-body">
                                    <div class="pt-4 pb-2 animate__animated animate__fadeInUp animate__fast">
                                        <div class="d-flex justify-content-center py-2">
                                            <a href="{{ url_for('login') }}"
                                                class="logo d-flex align-items-center w-auto">
                                                <img src="{{ url_for('static', filename='assets/img/bsu-neu-logo.png') }}"
                                                    alt="BatStateU Logo" class="img-responsive" />
                                            </a>
                                        </div>
                                        <h5 class="card-title text-center pb-0 fs-4">Two-Factor Authentication</h5>
                                        <p class="text-center small" id="auth-message">
                                            Enter the authentication code from your app
                                        </p>
                                    </div>

                                    <form method="POST" action="{{ url_for('two-factor.login') }}"
                                        class="row g-3 needs-validation animate__animated animate__fadeInUp animate__fast"
                                        novalidate>
                                        {# csrf token handled by Flask-WTF if enabled #}

                                        <div class="col-12" id="code-section">
                                            <label for="code" class="form-label">Authentication Code</label>
                                            <input id="code" type="text" class="form-control" name="code"
                                                inputmode="numeric" autofocus autocomplete="one-time-code"
                                                placeholder="Enter 6-digit code" />
                                        </div>

                                        <div class="col-12" id="recovery-section" style="display:none;">
                                            <label for="recovery_code" class="form-label">Recovery Code</label>
                                            <input id="recovery_code" type="text" class="form-control"
                                                name="recovery_code" autocomplete="one-time-code"
                                                placeholder="Enter recovery code" />
                                        </div>

                                        <div class="col-12 text-center">
                                            <button type="button" class="btn btn-link" id="toggle-code-type">
                                                Use a recovery code
                                            </button>
                                        </div>

                                        <div class="col-12">
                                            <button type="submit" class="btn btn-primary w-100">
                                                Verify
                                            </button>
                                        </div>
                                    </form>

                                    <script>
                                        document.addEventListener('DOMContentLoaded', function() {
                                            const codeSection = document.getElementById('code-section');
                                            const recoverySection = document.getElementById('recovery-section');
                                            const toggleButton = document.getElementById('toggle-code-type');
                                            const authMessage = document.getElementById('auth-message');
                                            const codeInput = document.getElementById('code');
                                            const recoveryCodeInput = document.getElementById('recovery_code');

                                            toggleButton.addEventListener('click', function() {
                                                if (codeSection.style.display !== 'none') {
                                                    codeSection.style.display = 'none';
                                                    recoverySection.style.display = 'block';
                                                    toggleButton.textContent = 'Use an authentication code';
                                                    authMessage.textContent = 'Enter one of your emergency recovery codes';
                                                    recoveryCodeInput.focus();
                                                } else {
                                                    codeSection.style.display = 'block';
                                                    recoverySection.style.display = 'none';
                                                    toggleButton.textContent = 'Use a recovery code';
                                                    authMessage.textContent = 'Enter the authentication code from your app';
                                                    codeInput.focus();
                                                }
                                            });
                                        });
                                    </script>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>
{% endblock %}
