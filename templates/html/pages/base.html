<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Web Pages{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/style.css') }}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
        <a class="navbar-brand" href="{{ url_for('admin_routes.pages_home') }}">Pages</a>
        <div class="navbar-nav me-auto">
            <a class="nav-link" href="{{ url_for('admin_routes.policy_page') }}">Policy</a>
            <a class="nav-link" href="{{ url_for('admin_routes.dashboard_page') }}">Dashboard</a>
            <a class="nav-link" href="{{ url_for('admin_routes.route_list_page') }}">Route List</a>
            <a class="nav-link" href="{{ url_for('kiosk') }}">Kiosk</a>
        </div>
        <div class="d-flex align-items-center gap-2">
            <span class="text-light small">{{ current_full_name or current_username }}</span>
            <form method="post" action="{{ url_for('auth_routes.auth_logout') }}" class="m-0">
                <button type="submit" class="btn btn-sm btn-outline-light">Logout</button>
            </form>
        </div>
    </nav>

    <main class="container py-4">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
